kind = "web"
previewPath = "/"
title = "Meditation & Wisdom Tour"
version = "1.0.0"
id = "artifacts/meditation-tour"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23327

[services.development]
run = "pnpm --filter @workspace/meditation-tour run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/meditation-tour", "run", "build" ]
publicDir = "artifacts/meditation-tour/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23327"
BASE_PATH = "/"
